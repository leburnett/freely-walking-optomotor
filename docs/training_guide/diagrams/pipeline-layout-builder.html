<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pipeline Layout Builder</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;--fg:#e0e0e0;--fg2:#999;
  --blue-dk:#3B6FA0;--blue-md:#5A8EBE;--blue-lt:#7BADD4;
  --orange:#e8983e;--green:#4caf50;--grey:#888;
  --canvas-bg:#fff;--node-shadow:0 2px 6px rgba(0,0,0,.15);
}
html,body{height:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;font-size:13px;background:var(--bg);color:var(--fg)}

/* ── Layout ── */
.app{display:grid;grid-template-columns:260px 1fr;grid-template-rows:1fr auto;height:100vh}
.sidebar{grid-row:1/3;background:var(--bg2);border-right:1px solid #333;overflow-y:auto;padding:10px}
.canvas-area{position:relative;overflow:auto;background:#e8e8e8}
.prompt-bar{background:var(--bg2);border-top:1px solid #333;padding:10px 14px;max-height:180px;overflow-y:auto;grid-column:2}

/* ── Sidebar ── */
.sb-title{font-size:15px;font-weight:700;margin-bottom:10px;color:#fff;display:flex;align-items:center;gap:6px}
.sb-section{margin-bottom:14px}
.sb-section h3{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--fg2);margin-bottom:6px;border-bottom:1px solid #333;padding-bottom:4px}
.sb-btn{display:block;width:100%;padding:6px 8px;margin-bottom:4px;background:var(--bg3);border:1px solid #444;border-radius:4px;color:var(--fg);font-size:12px;cursor:pointer;text-align:left;transition:background .15s}
.sb-btn:hover{background:#1a4a80}
.sb-btn.active{background:var(--blue-dk);border-color:var(--blue-md)}
.sb-btn-sm{display:inline-block;padding:4px 10px;font-size:11px;background:var(--bg3);border:1px solid #555;border-radius:3px;color:var(--fg);cursor:pointer;margin-right:4px;margin-bottom:4px}
.sb-btn-sm:hover{background:#1a4a80}
.sb-btn-sm.danger{border-color:#c0392b}
.sb-btn-sm.danger:hover{background:#c0392b}
.node-chip{display:flex;align-items:center;gap:6px;padding:4px 8px;margin-bottom:3px;border-radius:4px;font-size:11px;cursor:grab;border:1px solid transparent;transition:border-color .15s}
.node-chip:hover{border-color:#666}
.node-chip .dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* ── Canvas ── */
.canvas{position:relative;width:1200px;min-height:900px;background:var(--canvas-bg);margin:0 auto}
.canvas.cols-3{display:grid;grid-template-columns:1fr 2fr 1fr;min-height:900px}
.canvas.cols-2{display:grid;grid-template-columns:1fr 2fr;min-height:900px}
.canvas.cols-1{display:block}
.col{padding:8px;position:relative}
.col-header{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;text-align:center;padding:6px 0;margin-bottom:6px;color:#555}
.col-left .col-header{color:var(--orange);border-bottom:2px solid var(--orange)}
.col-center .col-header{color:var(--blue-dk);border-bottom:2px solid var(--blue-dk)}
.col-right .col-header{color:var(--green);border-bottom:2px solid var(--green)}

/* ── Image Slots ── */
.img-slot{border:2px dashed #ccc;border-radius:6px;margin-bottom:8px;background:#fafafa;position:relative;min-height:80px}
.img-slot.has-image{border-style:solid;border-color:#ddd}
.img-slot .slot-header{display:flex;align-items:center;gap:6px;padding:4px 8px;font-size:11px;font-weight:600;color:#555}
.img-slot .badge{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.badge-orange{background:var(--orange)}
.badge-green{background:var(--green)}
.img-slot .drop-zone{padding:12px;text-align:center;color:#bbb;font-size:11px;cursor:pointer;min-height:60px;display:flex;align-items:center;justify-content:center}
.img-slot .drop-zone.dragover{background:#e8f4ff;border-color:var(--blue-md)}
.img-slot img{width:100%;display:block;border-top:1px solid #eee}
.img-slot .caption{width:100%;border:none;border-top:1px solid #eee;padding:4px 8px;font-size:11px;color:#666;background:transparent;font-family:inherit}
.img-slot .clear-btn{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}

/* ── Flowchart Nodes ── */
.flow-node{position:absolute;cursor:grab;user-select:none;border-radius:6px;padding:8px 14px;font-size:11px;font-weight:600;color:#fff;text-align:center;min-width:100px;box-shadow:var(--node-shadow);z-index:2;transition:box-shadow .15s}
.flow-node:hover{box-shadow:0 3px 12px rgba(0,0,0,.25)}
.flow-node.dragging{opacity:.85;z-index:100;cursor:grabbing}
.flow-node.selected{outline:2px solid #ff6b6b;outline-offset:2px}
.flow-node.diamond{transform:rotate(0deg);border-radius:4px;background:#f0f0f0!important;color:#666!important;font-style:italic;font-weight:500;border:1px solid #bbb}
.flow-node .badge-link{position:absolute;top:-8px;right:-8px;width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center}
.flow-node .node-text{pointer-events:none}

/* ── Annotations ── */
.annotation{position:absolute;border:1.5px dashed #bbb;border-radius:4px;padding:6px 8px;font-size:11px;color:#888;background:rgba(255,255,255,.95);min-width:80px;min-height:30px;cursor:grab;z-index:1}
.annotation:focus-within{border-color:var(--blue-md);color:#333}
.annotation .ann-text{outline:none;min-width:60px;display:block}
.annotation .ann-delete{position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:#e74c3c;color:#fff;border:none;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center}
.annotation:hover .ann-delete{display:flex}

/* ── SVG Arrows ── */
.arrow-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}

/* ── Prompt Bar ── */
.prompt-bar .prompt-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prompt-bar .prompt-header span{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--fg2)}
.prompt-bar .copy-btn{padding:4px 12px;background:var(--blue-dk);border:none;border-radius:3px;color:#fff;font-size:11px;cursor:pointer}
.prompt-bar .copy-btn:hover{background:var(--blue-md)}
.prompt-text{font-size:12px;color:var(--fg);line-height:1.5;white-space:pre-wrap;font-family:ui-monospace,monospace;max-height:120px;overflow-y:auto}

/* ── Mode Indicator ── */
.mode-bar{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:var(--blue-dk);color:#fff;padding:4px 16px;border-radius:20px;font-size:11px;font-weight:600;z-index:200;pointer-events:none;opacity:0;transition:opacity .2s}
.mode-bar.visible{opacity:1;pointer-events:auto}

/* ── File input hidden ── */
.hidden-input{display:none}
</style>
</head>
<body>
<div class="app">

<!-- ═══ SIDEBAR ═══ -->
<div class="sidebar">
  <div class="sb-title">Pipeline Layout Builder</div>

  <!-- Presets -->
  <div class="sb-section">
    <h3>Presets</h3>
    <button class="sb-btn" onclick="loadPreset('full')">Full Pipeline</button>
    <button class="sb-btn" onclick="loadPreset('linear')">Simple Linear</button>
    <button class="sb-btn" onclick="loadPreset('downstream')">Downstream Focus</button>
  </div>

  <!-- Layout -->
  <div class="sb-section">
    <h3>Layout</h3>
    <select id="colLayout" onchange="setLayout(this.value)" style="width:100%;padding:5px;background:var(--bg3);border:1px solid #555;color:var(--fg);border-radius:3px;font-size:12px">
      <option value="3" selected>3 columns (25-50-25)</option>
      <option value="2">2 columns (30-70)</option>
      <option value="1">Single column</option>
    </select>
  </div>

  <!-- Tools -->
  <div class="sb-section">
    <h3>Tools</h3>
    <button class="sb-btn" id="btnConnect" onclick="toggleConnectMode()">Draw Connection</button>
    <button class="sb-btn" onclick="addAnnotation()">Add Annotation</button>
    <button class="sb-btn" onclick="addCustomNode()">Add Custom Node</button>
    <button class="sb-btn sb-btn-sm danger" onclick="clearAll()">Clear All</button>
  </div>

  <!-- Available Nodes -->
  <div class="sb-section">
    <h3>Add Nodes (click to place)</h3>
    <div id="nodeList"></div>
  </div>

  <!-- Active Connections -->
  <div class="sb-section">
    <h3>Connections (<span id="connCount">0</span>)</h3>
    <div id="connList" style="max-height:120px;overflow-y:auto"></div>
  </div>
</div>

<!-- ═══ CANVAS ═══ -->
<div class="canvas-area" id="canvasArea">
  <div class="mode-bar" id="modeBar">Click two nodes to connect</div>
  <div class="canvas cols-3" id="canvas">
    <!-- Left Column -->
    <div class="col col-left" id="colLeft">
      <div class="col-header">Data Structures</div>
      <div id="leftSlots"></div>
    </div>
    <!-- Center Column -->
    <div class="col col-center" id="colCenter">
      <div class="col-header">Processing Pipeline</div>
      <svg class="arrow-svg" id="arrowSvg">
        <defs>
          <marker id="ah" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
            <path d="M0 0L10 3.5L0 7z" fill="var(--blue-dk)"/>
          </marker>
        </defs>
      </svg>
      <div id="nodeContainer" style="position:relative;min-height:800px"></div>
    </div>
    <!-- Right Column -->
    <div class="col col-right" id="colRight">
      <div class="col-header">Outputs</div>
      <div id="rightSlots"></div>
    </div>
  </div>
</div>

<!-- ═══ PROMPT BAR ═══ -->
<div class="prompt-bar">
  <div class="prompt-header">
    <span>Generated Prompt</span>
    <button class="copy-btn" onclick="copyPrompt()">Copy</button>
  </div>
  <div class="prompt-text" id="promptOut">Load a preset or add nodes to begin.</div>
</div>

</div>

<input type="file" accept="image/*" class="hidden-input" id="fileInput">

<script>
// ═══════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════
const NODE_TEMPLATES = [
  {id:'run_exp',label:'Run Experiment (protocol_XX.m)',color:'#3B6FA0',type:'box'},
  {id:'ufmf',label:'UFMF Video (.ufmf)',color:'diamond',type:'diamond'},
  {id:'log_mat',label:'LOG.mat',color:'diamond',type:'diamond'},
  {id:'flytracker',label:'FlyTracker (offline tracking)',color:'#5A8EBE',type:'box'},
  {id:'feat',label:'feat.mat',color:'diamond',type:'diamond'},
  {id:'trx',label:'trx.mat',color:'diamond',type:'diamond'},
  {id:'combine',label:'combine_data_one_cohort(feat, trx)',color:'#7BADD4',type:'box'},
  {id:'comb_data',label:'comb_data struct',color:'diamond',type:'diamond'},
  {id:'save_mat',label:'Save *_data.mat (LOG + comb_data + n_fly_data)',color:'#3B6FA0',type:'box'},
  {id:'one_cohort_cond',label:'comb_data_one_cohort_cond(LOG, comb_data)',color:'#5A8EBE',type:'box'},
  {id:'data_single',label:'DATA struct (single cohort)',color:'diamond',type:'diamond'},
  {id:'across_cohorts',label:'comb_data_across_cohorts_cond(protocol_dir)',color:'#5A8EBE',type:'box'},
  {id:'data_hier',label:'DATA.(strain).(sex)(cohort_idx).(condition).(metric)',color:'#3B6FA0',type:'box'},
  {id:'analysis',label:'Analysis scripts (MATLAB)',color:'#7BADD4',type:'box'},
  {id:'preprocess',label:'preprocess.py (Python)',color:'#7BADD4',type:'box'},
  {id:'export_traj',label:'export_trajectory_data.m (MATLAB)',color:'#7BADD4',type:'box'},
  {id:'pub_figs',label:'Publication figures',color:'diamond',type:'diamond'},
  {id:'parquet',label:'Parquet files / Dash dashboard',color:'diamond',type:'diamond'},
  {id:'json_gz',label:'.json.gz / Trajectory viewer',color:'diamond',type:'diamond'},
];

const state = {
  layout: 3,
  nodes: [],       // {uid, templateId, label, x, y, w, color, type, badges:[]}
  connections: [],  // {from, to}
  annotations: [],  // {uid, text, x, y}
  leftSlots: [],    // {letter, caption, imageDataUrl}
  rightSlots: [],
  connectMode: false,
  connectFrom: null,
  selectedNode: null,
  nextUid: 1,
};

function uid() { return state.nextUid++; }

// ═══════════════════════════════════════════════════════
// Sidebar: Node list
// ═══════════════════════════════════════════════════════
function renderNodeList() {
  const el = document.getElementById('nodeList');
  el.innerHTML = NODE_TEMPLATES.map(t => {
    const bg = t.type === 'diamond' ? '#ddd' : t.color;
    const placed = state.nodes.some(n => n.templateId === t.id);
    return `<div class="node-chip${placed?' style="opacity:.4"':''}" onclick="placeNode('${t.id}')" title="${placed?'Already placed':'Click to place'}">
      <span class="dot" style="background:${bg};${t.type==='diamond'?'transform:rotate(45deg)':''}"></span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.label}</span>
    </div>`;
  }).join('');
}

function placeNode(templateId) {
  const t = NODE_TEMPLATES.find(n => n.id === templateId);
  if (!t) return;
  const container = document.getElementById('nodeContainer');
  const rect = container.getBoundingClientRect();
  // Stack vertically, offset based on existing count
  const yOff = state.nodes.length * 50 + 20;
  const xOff = (rect.width / 2) - 80;
  state.nodes.push({
    uid: uid(), templateId: t.id, label: t.label,
    x: Math.max(10, xOff), y: yOff,
    color: t.type === 'diamond' ? '#f0f0f0' : t.color,
    type: t.type, badges: []
  });
  renderAll();
}

function addCustomNode() {
  const label = prompt('Node label:');
  if (!label) return;
  const color = prompt('Color (hex, e.g. #3B6FA0):', '#5A8EBE') || '#5A8EBE';
  const container = document.getElementById('nodeContainer');
  const rect = container.getBoundingClientRect();
  state.nodes.push({
    uid: uid(), templateId: 'custom_'+state.nextUid, label,
    x: rect.width/2 - 60, y: state.nodes.length * 50 + 20,
    color, type: 'box', badges: []
  });
  renderAll();
}

// ═══════════════════════════════════════════════════════
// Image Slots
// ═══════════════════════════════════════════════════════
function initSlots() {
  state.leftSlots = 'ABCDE'.split('').map(l => ({letter:l, caption:'', imageDataUrl:null}));
  state.rightSlots = 'FGHIJ'.split('').map(l => ({letter:l, caption:'', imageDataUrl:null}));
}

function renderSlots() {
  renderSlotColumn('leftSlots', 'leftSlots', 'badge-orange');
  renderSlotColumn('rightSlots', 'rightSlots', 'badge-green');
}

function renderSlotColumn(stateKey, domId, badgeClass) {
  const el = document.getElementById(domId);
  el.innerHTML = state[stateKey].map((s, i) => {
    const hasImg = !!s.imageDataUrl;
    return `<div class="img-slot${hasImg?' has-image':''}" data-slotkey="${stateKey}" data-idx="${i}">
      <div class="slot-header">
        <span class="badge ${badgeClass}">${s.letter}</span>
        <span style="flex:1;font-size:10px">${s.letter}</span>
      </div>
      ${hasImg
        ? `<img src="${s.imageDataUrl}"><button class="clear-btn" onclick="clearSlotImage('${stateKey}',${i})">&times;</button>`
        : `<div class="drop-zone" onclick="clickUpload('${stateKey}',${i})"
               ondragover="event.preventDefault();this.classList.add('dragover')"
               ondragleave="this.classList.remove('dragover')"
               ondrop="dropImage(event,'${stateKey}',${i})">
            Drop image or click to upload</div>`
      }
      <input class="caption" placeholder="Caption..." value="${s.caption||''}"
             onchange="state.${stateKey}[${i}].caption=this.value;updatePrompt()">
    </div>`;
  }).join('');
}

let pendingSlotKey = null, pendingSlotIdx = null;
function clickUpload(key, idx) {
  pendingSlotKey = key; pendingSlotIdx = idx;
  document.getElementById('fileInput').click();
}
document.getElementById('fileInput').addEventListener('change', function(e) {
  if (!e.target.files[0]) return;
  readFileToSlot(e.target.files[0], pendingSlotKey, pendingSlotIdx);
  e.target.value = '';
});
function dropImage(e, key, idx) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) readFileToSlot(f, key, idx);
}
function readFileToSlot(file, key, idx) {
  const r = new FileReader();
  r.onload = () => { state[key][idx].imageDataUrl = r.result; renderSlots(); updatePrompt(); };
  r.readAsDataURL(file);
}
function clearSlotImage(key, idx) {
  state[key][idx].imageDataUrl = null;
  renderSlots(); updatePrompt();
}

// ═══════════════════════════════════════════════════════
// Flowchart Node Rendering + Drag
// ═══════════════════════════════════════════════════════
function renderNodes() {
  const container = document.getElementById('nodeContainer');
  // Keep SVG, remove old nodes and annotations
  container.querySelectorAll('.flow-node,.annotation').forEach(e => e.remove());

  state.nodes.forEach(n => {
    const el = document.createElement('div');
    el.className = 'flow-node' + (n.type==='diamond'?' diamond':'') + (state.selectedNode===n.uid?' selected':'');
    el.style.left = n.x + 'px';
    el.style.top = n.y + 'px';
    if (n.type !== 'diamond') el.style.background = n.color;
    el.dataset.uid = n.uid;
    el.innerHTML = `<span class="node-text">${n.label}</span>`;
    // Badge links
    n.badges.forEach(b => {
      const isLeft = 'ABCDE'.includes(b);
      el.innerHTML += `<span class="badge-link" style="background:${isLeft?'var(--orange)':'var(--green)'}">${b}</span>`;
    });
    // Drag
    el.addEventListener('mousedown', startNodeDrag);
    // Click for connect mode or select
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      if (state.connectMode) { handleConnectClick(n.uid); return; }
      state.selectedNode = state.selectedNode === n.uid ? null : n.uid;
      renderNodes(); drawConnections();
    });
    // Double-click to edit label
    el.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      const newLabel = prompt('Edit label:', n.label);
      if (newLabel !== null) { n.label = newLabel; renderAll(); }
    });
    container.appendChild(el);
  });

  // Annotations
  state.annotations.forEach(a => {
    const el = document.createElement('div');
    el.className = 'annotation';
    el.style.left = a.x + 'px';
    el.style.top = a.y + 'px';
    el.innerHTML = `<span class="ann-text" contenteditable="true">${a.text}</span>
      <button class="ann-delete" onclick="deleteAnnotation(${a.uid})">&times;</button>`;
    el.querySelector('.ann-text').addEventListener('blur', function(){ a.text = this.textContent; updatePrompt(); });
    el.addEventListener('mousedown', startAnnotationDrag(a));
    container.appendChild(el);
  });

  renderNodeList();
  drawConnections();
  updatePrompt();
}

// Node dragging
let dragNode = null, dragOffset = {x:0,y:0};
function startNodeDrag(e) {
  if (state.connectMode) return;
  const el = e.currentTarget;
  const n = state.nodes.find(n => n.uid == el.dataset.uid);
  if (!n) return;
  dragNode = {el, node: n};
  const rect = el.getBoundingClientRect();
  dragOffset.x = e.clientX - rect.left;
  dragOffset.y = e.clientY - rect.top;
  el.classList.add('dragging');
  document.addEventListener('mousemove', onNodeDrag);
  document.addEventListener('mouseup', endNodeDrag);
  e.preventDefault();
}
function onNodeDrag(e) {
  if (!dragNode) return;
  const container = document.getElementById('nodeContainer');
  const cr = container.getBoundingClientRect();
  dragNode.node.x = Math.max(0, e.clientX - cr.left - dragOffset.x);
  dragNode.node.y = Math.max(0, e.clientY - cr.top - dragOffset.y);
  dragNode.el.style.left = dragNode.node.x + 'px';
  dragNode.el.style.top = dragNode.node.y + 'px';
  drawConnections();
}
function endNodeDrag() {
  if (dragNode) dragNode.el.classList.remove('dragging');
  dragNode = null;
  document.removeEventListener('mousemove', onNodeDrag);
  document.removeEventListener('mouseup', endNodeDrag);
  updatePrompt();
}

// Annotation dragging
function startAnnotationDrag(a) {
  return function(e) {
    if (e.target.classList.contains('ann-text') || e.target.classList.contains('ann-delete')) return;
    let ox = e.clientX - parseInt(e.currentTarget.style.left||0);
    let oy = e.clientY - parseInt(e.currentTarget.style.top||0);
    const el = e.currentTarget;
    const container = document.getElementById('nodeContainer');
    function mv(e2) {
      const cr = container.getBoundingClientRect();
      a.x = Math.max(0, e2.clientX - cr.left - (ox - el.getBoundingClientRect().left + cr.left));
      a.y = Math.max(0, e2.clientY - cr.top - (oy - el.getBoundingClientRect().top + cr.top));
      el.style.left = a.x + 'px';
      el.style.top = a.y + 'px';
    }
    function up() { document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); updatePrompt(); }
    document.addEventListener('mousemove', mv);
    document.addEventListener('mouseup', up);
    e.preventDefault();
  };
}

// ═══════════════════════════════════════════════════════
// Connections
// ═══════════════════════════════════════════════════════
function toggleConnectMode() {
  state.connectMode = !state.connectMode;
  state.connectFrom = null;
  state.selectedNode = null;
  document.getElementById('btnConnect').classList.toggle('active', state.connectMode);
  document.getElementById('modeBar').classList.toggle('visible', state.connectMode);
  renderNodes();
}

function handleConnectClick(nodeUid) {
  if (!state.connectFrom) {
    state.connectFrom = nodeUid;
    state.selectedNode = nodeUid;
    document.getElementById('modeBar').textContent = 'Now click the target node';
    renderNodes();
  } else if (state.connectFrom !== nodeUid) {
    state.connections.push({from: state.connectFrom, to: nodeUid});
    state.connectFrom = null;
    state.selectedNode = null;
    document.getElementById('modeBar').textContent = 'Click two nodes to connect';
    renderAll();
  }
}

function drawConnections() {
  const svg = document.getElementById('arrowSvg');
  // Remove old paths
  svg.querySelectorAll('path.conn').forEach(p => p.remove());
  const container = document.getElementById('nodeContainer');
  const cr = container.getBoundingClientRect();

  state.connections.forEach(c => {
    const fromEl = container.querySelector(`[data-uid="${c.from}"]`);
    const toEl = container.querySelector(`[data-uid="${c.to}"]`);
    if (!fromEl || !toEl) return;
    const fr = fromEl.getBoundingClientRect();
    const tr = toEl.getBoundingClientRect();
    const x1 = fr.left + fr.width/2 - cr.left;
    const y1 = fr.top + fr.height - cr.top;
    const x2 = tr.left + tr.width/2 - cr.left;
    const y2 = tr.top - cr.top;
    const cy1 = y1 + (y2-y1)*0.4;
    const cy2 = y2 - (y2-y1)*0.4;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${x1},${y1} C${x1},${cy1} ${x2},${cy2} ${x2},${y2}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','#3B6FA0');
    path.setAttribute('stroke-width','1.5');
    path.setAttribute('marker-end','url(#ah)');
    path.classList.add('conn');
    svg.appendChild(path);
  });

  document.getElementById('connCount').textContent = state.connections.length;
  renderConnList();
}

function renderConnList() {
  const el = document.getElementById('connList');
  el.innerHTML = state.connections.map((c, i) => {
    const fn = state.nodes.find(n=>n.uid===c.from);
    const tn = state.nodes.find(n=>n.uid===c.to);
    const fl = fn ? fn.label.slice(0,20) : '?';
    const tl = tn ? tn.label.slice(0,20) : '?';
    return `<div style="font-size:10px;padding:2px 0;display:flex;align-items:center;gap:4px">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${fl} → ${tl}</span>
      <button class="sb-btn-sm danger" onclick="deleteConn(${i})" style="padding:1px 6px;font-size:9px">&times;</button>
    </div>`;
  }).join('');
}
function deleteConn(i) { state.connections.splice(i,1); renderAll(); }

// ═══════════════════════════════════════════════════════
// Annotations
// ═══════════════════════════════════════════════════════
function addAnnotation() {
  state.annotations.push({uid: uid(), text: 'Click to edit...', x: 20, y: state.nodes.length*50 + 40});
  renderNodes();
}
function deleteAnnotation(auid) {
  state.annotations = state.annotations.filter(a => a.uid !== auid);
  renderNodes();
}

// ═══════════════════════════════════════════════════════
// Layout
// ═══════════════════════════════════════════════════════
function setLayout(cols) {
  state.layout = parseInt(cols);
  const canvas = document.getElementById('canvas');
  canvas.className = 'canvas cols-' + state.layout;
  document.getElementById('colLeft').style.display = state.layout >= 2 ? '' : 'none';
  document.getElementById('colRight').style.display = state.layout >= 3 ? '' : 'none';
  updatePrompt();
}

// ═══════════════════════════════════════════════════════
// Presets
// ═══════════════════════════════════════════════════════

  state.nodes = []; state.connections = []; state.annotations = [];

      {id:'run_exp', x:CX, y:10},

      {id:'log_mat', x:CX+100, y:65},
      {id:'flytracker', x:CX, y:120},
      {id:'feat', x:CX-80, y:175},
      {id:'trx', x:CX+80, y:175},
      {id:'combine', x:CX-20, y:230},
      {id:'comb_data', x:CX, y:290},
      {id:'save_mat', x:CX-10, y:350},
      {id:'one_cohort_cond', x:CX-140, y:430},

      {id:'across_cohorts', x:CX+80, y:430},
      {id:'data_hier', x:CX+60, y:495},
      {id:'analysis', x:CX-130, y:580},
      {id:'preprocess', x:CX+20, y:580},
      {id:'export_traj', x:CX+170, y:580},
      {id:'pub_figs', x:CX-130, y:645},
      {id:'parquet', x:CX+20, y:645},
      {id:'json_gz', x:CX+170, y:645},
    ];
    defs.forEach(d => {
      const t = NODE_TEMPLATES.find(n=>n.id===d.id);
      state.nodes.push({
        uid:uid(), templateId:t.id, label:t.label,

        color: t.type==='diamond'?'#f0f0f0':t.color,
        type:t.type, badges:[]
      });
    });
    // Connections
    const conns = [
      ['run_exp','ufmf'],['run_exp','log_mat'],['ufmf','flytracker'],
      ['flytracker','feat'],['flytracker','trx'],
      ['feat','combine'],['trx','combine'],
      ['combine','comb_data'],['comb_data','save_mat'],
      ['save_mat','one_cohort_cond'],['save_mat','across_cohorts'],
      ['one_cohort_cond','data_single'],
      ['across_cohorts','data_hier'],
      ['data_hier','analysis'],['data_hier','preprocess'],['data_hier','export_traj'],
      ['analysis','pub_figs'],['preprocess','parquet'],['export_traj','json_gz'],
    ];
    conns.forEach(([f,t]) => {
      const fn = state.nodes.find(n=>n.templateId===f);
      const tn = state.nodes.find(n=>n.templateId===t);
      if(fn&&tn) state.connections.push({from:fn.uid, to:tn.uid});
    });
    // Annotations
    state.annotations.push({uid:uid(), text:'Remove bad tracking\nFilter > 50 mm/s\nInterpolate gaps\nCompute 12 metrics', x:0, y:230});
    state.annotations.push({uid:uid(), text:'Split by condition\nusing LOG frame indices\n(+300 frame pre buffer)', x:0, y:430});
    state.annotations.push({uid:uid(), text:'Merge all experiments\nfor one protocol', x:CX+230, y:430});
    // Badge links
    const logNode = state.nodes.find(n=>n.templateId==='log_mat');
    if(logNode) logNode.badges=['A'];
    const hierNode = state.nodes.find(n=>n.templateId==='data_hier');
    if(hierNode) hierNode.badges=['B','C','D','E'];
    const singleNode = state.nodes.find(n=>n.templateId==='data_single');
    if(singleNode) singleNode.badges=['F'];
    const pubNode = state.nodes.find(n=>n.templateId==='pub_figs');
    if(pubNode) pubNode.badges=['G'];
    const parqNode = state.nodes.find(n=>n.templateId==='parquet');
    if(parqNode) parqNode.badges=['H'];
    const jsonNode = state.nodes.find(n=>n.templateId==='json_gz');
    if(jsonNode) jsonNode.badges=['I'];

  } else if (name === 'linear') {
    const ids = ['run_exp','ufmf','flytracker','feat','combine','comb_data','save_mat','across_cohorts','data_hier'];
    ids.forEach((id,i) => {
      const t = NODE_TEMPLATES.find(n=>n.id===id);

        x:CX, y:i*60+10,

    for(let i=0;i<state.nodes.length-1;i++) {
      state.connections.push({from:state.nodes[i].uid, to:state.nodes[i+1].uid});

  } else if (name === 'downstream') {

    const conns=[['data_hier','analysis'],['data_hier','preprocess'],['data_hier','export_traj'],['analysis','pub_figs'],['preprocess','parquet'],['export_traj','json_gz']];
    conns.forEach(([f,t])=>{const fn=state.nodes.find(n=>n.templateId===f);const tn=state.nodes.find(n=>n.templateId===t);if(fn&&tn)state.connections.push({from:fn.uid,to:tn.uid});});
  }

  renderAll();
}

// ═══════════════════════════════════════════════════════
// Prompt
// ═══════════════════════════════════════════════════════
function updatePrompt() {
  const parts = [];
  const cols = state.layout;
  parts.push(`Create a ${cols === 3 ? '3-column (25%-50%-25%)' : cols === 2 ? '2-column (30%-70%)' : 'single-column'} data processing pipeline schematic.`);

  if (state.nodes.length) {
    // Sort by Y position
    const sorted = [...state.nodes].sort((a,b) => a.y - b.y);
    parts.push(`\nThe center column contains a vertical flowchart with ${state.nodes.length} nodes (top to bottom):`);
    sorted.forEach((n,i) => {
      const badges = n.badges.length ? ` [badges: ${n.badges.join(',')}]` : '';
      parts.push(`  ${i+1}. "${n.label}" (${n.type==='diamond'?'data node':'process box'})${badges}`);
    });
  }

  if (state.connections.length) {
    parts.push(`\nConnections (arrows):`);
    state.connections.forEach(c => {
      const fn = state.nodes.find(n=>n.uid===c.from);
      const tn = state.nodes.find(n=>n.uid===c.to);
      if(fn&&tn) parts.push(`  "${fn.label}" → "${tn.label}"`);
    });
  }

  const leftImgs = state.leftSlots.filter(s => s.imageDataUrl || s.caption);
  if (leftImgs.length) {
    parts.push(`\nLeft column "Data Structures" images:`);
    leftImgs.forEach(s => parts.push(`  ${s.letter} — ${s.caption || '(no caption)'}`));
  }

  const rightImgs = state.rightSlots.filter(s => s.imageDataUrl || s.caption);
  if (rightImgs.length) {
    parts.push(`\nRight column "Outputs" images:`);
    rightImgs.forEach(s => parts.push(`  ${s.letter} — ${s.caption || '(no caption)'}`));
  }

  if (state.annotations.length) {
    parts.push(`\nAnnotations:`);
    state.annotations.forEach(a => {
      const pos = a.y < 200 ? 'top' : a.y < 500 ? 'middle' : 'bottom';
      const side = a.x < 100 ? 'left side' : a.x > 300 ? 'right side' : 'center';
      parts.push(`  "${a.text.replace(/\n/g, ' / ')}" (${pos}, ${side})`);
    });
  }

  document.getElementById('promptOut').textContent = parts.join('\n');
}

function copyPrompt() {
  const text = document.getElementById('promptOut').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

// ═══════════════════════════════════════════════════════
// Clear
// ═══════════════════════════════════════════════════════
function clearAll() {
  if (!confirm('Clear all nodes, connections, and annotations?')) return;
  state.nodes = []; state.connections = []; state.annotations = [];
  state.selectedNode = null; state.connectFrom = null;
  renderAll();
}

// ═══════════════════════════════════════════════════════
// Master render
// ═══════════════════════════════════════════════════════
function renderAll() {
  renderSlots();
  renderNodes();
}

// Init

initSlots();
loadPreset('full');
</script>
